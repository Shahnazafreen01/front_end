<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SetTimeout</title>
</head>
<body>
    <p id="msg">Waiting...</p>

    <script>
        setTimeout(() => {
            document.getElementById("msg").textContent = "Hello! 4 seconds ho gaye"; 
        },4000);
        
    </script>
</body>
</html>
